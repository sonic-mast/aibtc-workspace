name = "sonic-mast-heartbeat"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "STATE_WORKER"
service = "sonic-mast-state"

[triggers]
crons = ["*/15 * * * *"]

# x402 oracle endpoint URLs — set via `wrangler secret put X402_PRICE_URL` and `wrangler secret put X402_MACRO_URL`
# If unset, x402 health probe is skipped (reported as "unconfigured" in state).
